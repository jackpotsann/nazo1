<body style="margin:0;background:#fff;font-family:monospace;padding:3rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">dead silence, every head knows</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">even shadows make no sound</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">consider what remains of us</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">one secret the night keeps</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">many a soul has wondered why</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">past woman past and gone</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">only silence makes its home</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">something a mind cannot hold</p>
  <p style="font-size:1.4rem;line-height:3rem;text-align:left;">each ending echoes what was</p>
